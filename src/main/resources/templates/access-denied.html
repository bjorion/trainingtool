<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5">

<head th:include="fragments/layout :: header">
<title id="pageTitle">Access Denied</title>
</head>

<body>
	<div class="container">
		<div class="row">
			<div class="col-md-3">&nbsp;</div>
			<div class="col-md-6">
				<div class="alert" style="margin-top: 10em;">
					<p>
						<b>Sorry, you do not have the rights to view this page.</b>
					</p>
					<p>
						<a th:href="@{/home}">click here</a> to go to the main page.
					</p>
					<p>
						<a th:href="@{/logout}">click here</a> to log out.
					</p>
					<p>
						Time: <span th:text="${#strings.replace(#strings.substring(#temporals.createNow(),0,19),'T',' ')}"></span>
					</p>
					<p th:if="${message != null}">
						Message: <span th:text="${message}"></span>
					</p>
				</div>
			</div>
		</div>
	</div>
</body>
